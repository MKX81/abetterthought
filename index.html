<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>A Better Thought</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>

    <section class="hero">

        <div class="quote-card">

            <div class="symbol">
                ❝
            </div>

            <h1 id="quote">
                Loading wisdom...
            </h1>

            <p id="meaning"></p>

            <p id="author"></p>

        </div>

    </section>


    <section class="search-section">

        <p>
            A thought worth carrying today
        </p>


        <form action="https://www.startpage.com/sp/search" method="get" target="_blank">

            <input 
                type="text" 
                name="query" 
                placeholder="Search privately..."
            >

            <button type="submit">
                Search
            </button>

        </form>


    </section>


<script src="script.js"></script>

</body>

</html>
