<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>A Better Thought</title>

    <meta name="description"
        content="A daily proverb, a thoughtful explanation, and a quiet place to reflect.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="hero">

        <div class="quote-card">

            <div class="symbol">
                ❝
            </div>

            <h1 id="quote">
                Loading wisdom...
            </h1>

            <p id="meaning"></p>

            <p id="author"></p>

        </div>

        <div class="scroll-indicator">
            ↓
        </div>

    </section>


    <section class="search-section">

        <p class="search-heading">
            Need to explore further?
        </p>

        <form action="https://www.startpage.com/sp/search"
              method="get"
              target="_blank">

            <input
                type="text"
                name="query"
                placeholder="Search privately..."
                autocomplete="off">

            <button type="submit">
                Search
            </button>

        </form>

    </section>

    <script src="script.js"></script>

</body>

</html>
